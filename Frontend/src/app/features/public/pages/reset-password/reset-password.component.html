<div
    class="min-h-full flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-gray-50 selection:bg-pink-500 selection:text-white">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
            Restaurar Contraseña
        </h2>
        <p class="mt-2 text-center text-sm text-gray-600">
            Ingresa tu nueva contraseña a continuación.
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">

            <!-- Success Message -->
            <div *ngIf="successMessage" class="rounded-md bg-green-50 p-4 mb-6">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                            fill="currentColor" aria-hidden="true">
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3 text-sm font-medium text-green-800">
                        <p>{{ successMessage }}</p>
                        <p class="mt-1 text-green-700">Serás redirigido para iniciar sesión...</p>
                    </div>
                </div>
            </div>

            <!-- Error Message -->
            <div *ngIf="errorMessage" class="rounded-md bg-red-50 p-4 mb-6">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                            fill="currentColor" aria-hidden="true">
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3">
                        <h3 class="text-sm font-medium text-red-800">{{ errorMessage }}</h3>
                    </div>
                </div>
            </div>

            <form class="space-y-6" (ngSubmit)="onSubmit()" #resetForm="ngForm" *ngIf="!successMessage && token">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Nueva Contraseña</label>
                    <div class="mt-1">
                        <input [(ngModel)]="password" name="password" id="password" type="password" required
                            minlength="6" placeholder="Al menos 6 caracteres"
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-pink-500 focus:border-pink-500 sm:text-sm"
                            [disabled]="isSubmitting">
                    </div>
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirmar
                        Contraseña</label>
                    <div class="mt-1">
                        <input [(ngModel)]="confirmPassword" name="confirmPassword" id="confirmPassword" type="password"
                            required placeholder="Vuelve a escribir la contraseña"
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-pink-500 focus:border-pink-500 sm:text-sm"
                            [disabled]="isSubmitting">
                    </div>
                </div>

                <div>
                    <button type="submit" [disabled]="!resetForm.valid || isSubmitting"
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-bold uppercase tracking-wider text-white bg-pink-600 hover:bg-pink-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pink-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <span *ngIf="!isSubmitting">Guardar Contraseña</span>
                        <span *ngIf="isSubmitting" class="flex items-center">
                            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                                fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                            Guardando...
                        </span>
                    </button>
                </div>
            </form>

            <div class="mt-6" *ngIf="!token || errorMessage">
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">
                        <a routerLink="/auth/login" class="font-bold text-pink-600 hover:text-pink-500">Volver a Iniciar
                            Sesión</a>
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>
